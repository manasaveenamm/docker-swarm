name: Docker Swarm CI/CD & Scaling Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      scale_only:
        description: 'Skip code building and ONLY scale replicas?'
        type: boolean
        default: true
      replicas:
        description: 'Target replica count'
        required: true
        default: '3'

jobs:
  build-and-push:
    # Only run the build stage if we are pushing code changes or intentionally rebuilding
    if: ${{ github.event_name == 'push' || github.event.inputs.scale_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/swarm-demo-app:latest

  deploy-or-scale:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      always() && 
      (needs.build-and-push.result == 'success' || github.event.inputs.scale_only == 'true')
    steps:
      - name: Execute Swarm Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SWARM_MANAGER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Standard Deployment Loop
            if [ "${{ github.event.inputs.scale_only }}" != "true" ]; then
              echo "Deploying fresh changes to the Swarm..."
              
              cat << 'EOF' > docker-compose.yml
              version: '3.8'
              services:
                web:
                  image: ${{ secrets.DOCKERHUB_USERNAME }}/swarm-demo-app:latest
                  ports:
                    - "80:5000"
                  deploy:
                    replicas: 2
                    update_config:
                      parallelism: 1
                      delay: 5s
              EOF
              
              docker stack deploy -c docker-compose.yml myapp
            fi

            # 2. Scaling Operation Loop
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.scale_only }}" = "true" ]; then
              echo "Scaling web service to ${{ github.event.inputs.replicas }} replicas..."
              docker service scale myapp_web=${{ github.event.inputs.replicas }}
            fi

            # 3. LIVE VISIBILITY TRACKING
            echo "====================================================="
            echo "   WATCHING LIVE SCALING / DESIRED STATE EVENTS      "
            echo "====================================================="
            for i in {1..12}; do
              echo "Tracking Check #$i (Every 5 seconds):"
              docker service ps myapp_web --filter "desired-state=running"
              echo "-----------------------------------------------------"
              sleep 5
            done
